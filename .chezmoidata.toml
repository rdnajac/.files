[font]
size = 13
family = "JetBrains Mono"
ligatures =  false

[neovim]
sourceDir = "GitHub/neovim"
buildType = "RelWithDebInfo"
installPrefix = "$HOME/.local"

[apt]
packages = [
  "build-essential",
  "cmake",
  "curl",
  "gettext",
  "git",
  "libssl-dev",
  "linux-headers-\"$(uname -r)\"",
  "make",
  "net-tools",
  "ninja-build",
  "pkg-config",
  "rsync",
  "tmux",
  "vim",
  "bat",
  "dust",
  "eza",
  "fd-find",
  "ripgrep",
]
